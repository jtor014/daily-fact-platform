name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" | head -c 50000 >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review with Gemini
        id: review
        run: |
          REVIEW=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg diff "$DIFF" '{
              "contents": [{
                "parts": [{
                  "text": ("You are a senior code reviewer. Review this PR diff and check for:\n1. Hardcoded secrets, API keys, or credentials\n2. Security vulnerabilities (injection, XSS, etc.)\n3. Best practices violations\n4. Error handling issues\n5. Performance concerns\n\nBe concise. If everything looks good, say: \"Looks good to merge.\"\nIf there are issues, list each as an \"Action Required:\" item with a clear fix.\n\nDiff:\n" + $diff)
                }]
              }]
            }')")

          REVIEW_TEXT=$(echo "$REVIEW" | jq -r '.candidates[0].content.parts[0].text // "Error: Could not get review from Gemini."')

          echo "review<<REVIEW_EOF" >> "$GITHUB_OUTPUT"
          echo "$REVIEW_TEXT" >> "$GITHUB_OUTPUT"
          echo "REVIEW_EOF" >> "$GITHUB_OUTPUT"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF: ${{ steps.diff.outputs.diff }}

      - name: Post review comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## 🤖 Gemini Code Review

          ${{ steps.review.outputs.review }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
